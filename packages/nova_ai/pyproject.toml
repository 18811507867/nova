[tool.poetry]
name = "nova-ai"
packages = [
    { include = "nova_ai", from = "src" },
]
version = "0.0.1" # Use "-rc1", "-rc2", etc. for pre-release versions
description = "Let language models run code"
authors = ["Liujinming"]
readme = "README.md"

[tool.poetry.dependencies]

# Required dependencies
python = ">=3.9,<3.13"
setuptools = "*"
astor = "^0.8.1"
git-python = "^1.0.3"


[tool.poetry.group.dev.dependencies]
black = "^23.10.1"
isort = "^5.12.0"
pre-commit = "^3.5.0"
pytest = "^7.4.0"
sniffio = "^1.3.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
computex = "computex.agent:main"

[tool.black]
target-version = ['py311']

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
